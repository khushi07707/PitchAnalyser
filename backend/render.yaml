services:
  - type: web
    name: pitchpilotai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PROJECT_NAME
        value: AI Augmented Pitch Analyser
      - key: API_V1_STR
        value: /api
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 15
      - key: REFRESH_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: ALLOWED_ORIGINS
        sync: false
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_FILE_SIZE_MB
        value: 100
      - key: OPENAI_API_KEY
        sync: false
